name: Lean Build

on:
  push:
    branches: [main]
    paths:
      - 'formal_verification/**'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'
  pull_request:
    paths:
      - 'formal_verification/**'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          set -o pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lean / Mathlib build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .lake
          key: lean-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Fetch pre-built Mathlib oleans
        run: |
          # Speeds first build from ~hours to ~minutes by pulling cached
          # Mathlib artifacts from the Mathlib4 build cache.
          lake exe cache get || true

      - name: Build all formal verification targets
        run: lake build

      - name: Print build summary
        if: always()
        run: |
          echo "## Lean build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Toolchain: \`$(cat lean-toolchain)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Built modules:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          find .lake/build/lib/lean -name '*.olean' -path '*/FormalVerification/*' -o \
            -name '*.olean' -path '*/ABCFormalization/*' 2>/dev/null \
            | sed 's|.*/lean/||; s|\.olean$||; s|/|.|g' | sort -u >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
